<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevBoard</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Inter, sans-serif;
    }

    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #5b21b6, #7c3aed, #a855f7);
        color: white;
    }

    .container {
        text-align: center;
        max-width: 600px;
        padding: 2rem;
    }

    .logo {
        font-size: 3rem;
        font-weight: 800;
        margin-bottom: 1rem;
    }

    .tagline {
        font-size: 1.2rem;
        opacity: 0.9;
        margin-bottom: 2rem;
        line-height: 1.6;
    }

    .btn {
        display: inline-block;
        padding: 14px 28px;
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 12px;
        color: white;
        text-decoration: none;
        backdrop-filter: blur(10px);
        transition: 0.3s;
    }

    .btn:hover {
        background: rgba(255,255,255,0.25);
        transform: translateY(-2px);
    }
</style>
</head>
<body>

<div class="container">
    <div class="logo">DevBoard</div>
    <p class="tagline">
        A simple task tracker built for developers.
        Organize sprints, track issues, and ship faster.
    </p>
    <a href="#" class="btn">Get Started</a>
</div>

</body>
</html>
